events { worker_connections 1024; }

http {
    upstream sb_cluster {
        server node1:8201;
        server node2:8202;
        server node3:8203;
    }

    server {
        listen 80;
        server_name _;

        location / {
            proxy_pass http://sb_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
        }
    }
}
