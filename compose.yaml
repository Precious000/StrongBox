version: "3.9"

networks:
  sb_net:
    driver: bridge

services:
  postgres:
    image: postgres:15
    container_name: sb-postgres
    restart: unless-stopped
    networks:
      - sb_net
    environment:
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: postgres
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  node1:
    build:
      context: .
      dockerfile: Dockerfile.node
    container_name: sb-node1
    restart: unless-stopped
    networks:
      - sb_net
    ports:
      - "8201:8201"
    volumes:
      - ./data/node1:/data
    environment:
      NODE_ID: node1
      NODE_PORT: "8201"
      PEERS: "node2:8202,node3:8203"
      UNSEAL_THRESHOLD: "3"
      UNSEAL_TOTAL: "5"
      STORAGE_DIR: /data/secrets
      TOKEN_DIR: /data/tokens
      POLICY_DIR: /data/policies
      USER_DIR: /data/users
      LEASE_DIR: /data/leases
      CONSENSUS_DIR: /data/consensus
      AUDIT_LOG: /data/audit/audit.log
      AUDIT_KEY_FILE: /data/audit.key
      PG_HOST: postgres
      PG_PASS: postgrespassword
    depends_on:
      - postgres

  node2:
    build:
      context: .
      dockerfile: Dockerfile.node
    container_name: sb-node2
    restart: unless-stopped
    networks:
      - sb_net
    ports:
      - "8202:8202"
    volumes:
      - ./data/node2:/data
    environment:
      NODE_ID: node2
      NODE_PORT: "8202"
      PEERS: "node1:8201,node3:8203"
      UNSEAL_THRESHOLD: "3"
      UNSEAL_TOTAL: "5"
      STORAGE_DIR: /data/secrets
      TOKEN_DIR: /data/tokens
      POLICY_DIR: /data/policies
      USER_DIR: /data/users
      LEASE_DIR: /data/leases
      CONSENSUS_DIR: /data/consensus
      AUDIT_LOG: /data/audit/audit.log
      AUDIT_KEY_FILE: /data/audit.key
      PG_HOST: postgres
      PG_PASS: postgrespassword
    depends_on:
      - postgres

  node3:
    build:
      context: .
      dockerfile: Dockerfile.node
    container_name: sb-node3
    restart: unless-stopped
    networks:
      - sb_net
    ports:
      - "8203:8203"
    volumes:
      - ./data/node3:/data
    environment:
      NODE_ID: node3
      NODE_PORT: "8203"
      PEERS: "node1:8201,node2:8202"
      UNSEAL_THRESHOLD: "3"
      UNSEAL_TOTAL: "5"
      STORAGE_DIR: /data/secrets
      TOKEN_DIR: /data/tokens
      POLICY_DIR: /data/policies
      USER_DIR: /data/users
      LEASE_DIR: /data/leases
      CONSENSUS_DIR: /data/consensus
      AUDIT_LOG: /data/audit/audit.log
      AUDIT_KEY_FILE: /data/audit.key
      PG_HOST: postgres
      PG_PASS: postgrespassword
    depends_on:
      - postgres

  nginx:
    image: nginx:alpine
    container_name: sb-nginx
    restart: unless-stopped
    networks:
      - sb_net
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./data/certs:/etc/nginx/certs:ro
    depends_on:
      - node1
      - node2
      - node3
